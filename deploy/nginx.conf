# /etc/nginx/sites-available/game-incontrolable
# Replace YOUR_DOMAIN with your actual domain (e.g., game.yourdomain.com)
# If using just an IP, remove the server_name line and the SSL block

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Redirect HTTP to HTTPS (uncomment after setting up SSL)
    # return 301 https://$server_name$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout — keep alive for long game sessions
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

